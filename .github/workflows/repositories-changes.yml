name: REPOSITORY-CHANGES
run-name: Create/update Repositories ( ${{ github.event_name }} run by ${{ github.actor }} )

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:

  get-config:
    name: Repositories GitOps
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      matrix-repos: ${{ steps.repos.outputs.REPOS }}

    steps:

      - name: Check GITOPS_PAT secret exists
        env:
          gitops-secret: ${{ secrets.GITOPS_PAT }}
        if: ${{ env.gitops-secret == '' }}
        run: echo "echo the secret \"GITOPS_PAT\" has not been made; echo please go to \"settings \> secrets \> actions \> repository secrets\" to create it"

      - name: Checkout
        uses: actions/checkout@v3

      - name: Get Solution Repo's
        id: repos
        run: |
          repos=$(yq '{"include": .repositories.solutions + .repositories.pipeline + .repositories.deployment }' repo/repositories.yml -o=json | jq -c)
          echo $repos
          echo "REPOS=$repos" >> $GITHUB_OUTPUT

      # gitops=$(yq '.repositories.pipeline | filter(.name == "gitops")' repo/repositories.yml -o=json | jq -c)
      # repos=$(echo '{"include": [{"name":"gitops","repo":"devopsdemo-gitops","repo-description":"Configuration Management and IaC using GitHub Action Workflows","repo-template":"template-gitops","github-pages":false,"status":"active"}]}' | jq -c)


  make-changes:
    name: Make changes to repos
    needs: [get-config]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.get-config.outputs.matrix-repos) }}
    permissions:
      contents: write
      
    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install Node dependencies
        run: npm install

      - name: Check repo exists
        id: repo-exists
        run: .github/actions-scripts/repo-check-exists.mjs
        env:
          GHA_TOKEN: ${{ secrets.GITOPS_PAT }}
          REPO_OWNER: ${{ github.repository_owner	 }}
          REPO_NAME: ${{ matrix.repo }}

      - name: Check template exists
        id: template-exists
        run: .github/actions-scripts/repo-check-exists.mjs
        env:
          GHA_TOKEN: ${{ secrets.GITOPS_PAT }}
          REPO_OWNER: 'dr3dr3'
          REPO_NAME: ${{ matrix.repo-template }}

      - name: Create repo
        id: create-repo
        if: ${{ steps.repo-exists.outputs.result != 'true'  && steps.template-exists.outputs.result == 'true' && matrix.status == 'active' }}
        run: .github/actions-scripts/repo-create-using-template.mjs
        env:
          GHA_TOKEN: ${{ secrets.GITOPS_PAT }}
          REPO_TEMPLATE: ${{ matrix.repo-template	 }}
          REPO_OWNER: ${{ github.repository_owner	 }}
          REPO_NAME: ${{ matrix.repo }}
          REPO_DESC: ${{ matrix.repo-description }}

      - name: Update repo
        run: .github/actions-scripts/repo-update.mjs
        env:
          GHA_TOKEN: ${{ secrets.GITOPS_PAT }}
          REPO_OWNER: ${{ github.repository_owner	 }}
          REPO_NAME: ${{ matrix.repo }}

      - name: Update repo pages
        if: ${{ matrix.github-pages }}
        run: .github/actions-scripts/repo-update-pages.mjs
        env:
          GHA_TOKEN: ${{ secrets.GITOPS_PAT }}
          REPO_OWNER: ${{ github.repository_owner	 }}
          REPO_NAME: ${{ matrix.repo }}

      - name: GHA Summary
        run: echo "Repo ${{ matrix.repo }} created / updated" >> $GITHUB_STEP_SUMMARY