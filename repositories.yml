repositories:
  solutions:
    - name: start
      repo: devopsdemo-landing
      repo-description: 'Micro-frontend for landing page'
      repo-template: template-nextjs-landing
      route: root
      status: active
    - name: slides
      repo: devopsdemo-slides
      repo-description: 'Micro-frontend for slides using Sli.dev'
      repo-template: template-revealmd
      route: slides
      status: active
    - name: feature-flags
      repo: devopsdemo-featurevisor
      repo-description: 'Feature flag service'
      repo-template: template-featurevisor
      route: flags
      status: active
  pipeline:
    - name: pipeline
      repo: devopsdemo-pipeline
      repo-description: 'Continuous Delivery Pipeline using GitHub Action Workflows'
      repo-template: template-pipeline
      status: active
    - name: gitops
      repo: devopsdemo-gitops
      repo-description: 'Configuration Management and IaC using GitHub Action Workflows'
      repo-template: template-gitops
      status: active
  deployment:
    - name: stage
      repo: devopsdemo-stg
      repo-description: 'Repository for running deployments to Stage'
      repo-template: template-deployment
      status: active
    - name: production
      repo: devopsdemo-prd
      repo-description: 'Repository for running deployments to Production'
      repo-template: template-deployment
      status: active
